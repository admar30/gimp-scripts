name: Deploy Guidecut Web

on:
  push:
    branches: ["main"]
    paths:
      - "guidecut-webapp/**"
      - ".github/workflows/guidecut-web-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: guidecut-webapp/package-lock.json
      - run: npm ci
        working-directory: guidecut-webapp
      - run: npm run test:run
        working-directory: guidecut-webapp
      - run: npm run build
        working-directory: guidecut-webapp
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: guidecut-webapp/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
